<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="'Courier New', Consolas, monospace">

  <!-- Background -->
  <rect width="820" height="400" fill="#0f172a" rx="12"/>

  <!-- ══ PRODUCER ══ -->
  <rect x="20" y="40" width="150" height="160" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="68"  text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">Producer</text>
  <text x="95" y="86"  text-anchor="middle" fill="#64748b" font-size="11">(1 thread)</text>
  <line x1="40" y1="98" x2="150" y2="98" stroke="#1e3a5f" stroke-width="1"/>
  <text x="95" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">generates 500</text>
  <text x="95" y="134" text-anchor="middle" fill="#94a3b8" font-size="11">random</text>
  <text x="95" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">transfers</text>
  <text x="95" y="166" text-anchor="middle" fill="#94a3b8" font-size="11">and enqueues</text>

  <!-- push() arrow -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#60a5fa"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a78bfa"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#34d399"/></marker>
  </defs>
  <line x1="172" y1="120" x2="248" y2="120" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="210" y="112" text-anchor="middle" fill="#60a5fa" font-size="11">push()</text>

  <!-- ══ WORKQUEUE ══ -->
  <rect x="256" y="20" width="178" height="200" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="345" y="50"  text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">WorkQueue</text>
  <line x1="276" y1="62" x2="414" y2="62" stroke="#312e5f" stroke-width="1"/>
  <text x="345" y="83"  text-anchor="middle" fill="#94a3b8" font-size="11">circular buffer</text>
  <text x="345" y="99"  text-anchor="middle" fill="#94a3b8" font-size="11">capacity: 64</text>
  <line x1="276" y1="112" x2="414" y2="112" stroke="#312e5f" stroke-width="1"/>
  <text x="345" y="132" text-anchor="middle" fill="#64748b" font-size="11">pthread_mutex_t</text>
  <text x="345" y="150" text-anchor="middle" fill="#64748b" font-size="11">pthread_cond_t</text>
  <text x="345" y="168" text-anchor="middle" fill="#64748b" font-size="11">not_empty</text>
  <text x="345" y="184" text-anchor="middle" fill="#64748b" font-size="11">not_full</text>

  <!-- pop() arrow -->
  <line x1="436" y1="120" x2="512" y2="120" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="474" y="112" text-anchor="middle" fill="#a78bfa" font-size="11">pop()</text>

  <!-- ══ WORKERS ══ -->
  <rect x="520" y="20" width="150" height="200" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="595" y="50"  text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">Workers</text>
  <line x1="540" y1="62" x2="650" y2="62" stroke="#14532d" stroke-width="1"/>
  <rect x="540" y="74"  width="110" height="22" rx="3" fill="#14532d"/>
  <text x="595" y="89"  text-anchor="middle" fill="#86efac" font-size="11">Worker 1</text>
  <rect x="540" y="102" width="110" height="22" rx="3" fill="#14532d"/>
  <text x="595" y="117" text-anchor="middle" fill="#86efac" font-size="11">Worker 2</text>
  <rect x="540" y="130" width="110" height="22" rx="3" fill="#14532d"/>
  <text x="595" y="145" text-anchor="middle" fill="#86efac" font-size="11">Worker 3</text>
  <text x="595" y="178" text-anchor="middle" fill="#64748b" font-size="11">···  N threads  ···</text>
  <text x="595" y="196" text-anchor="middle" fill="#475569" font-size="10">1 PG connection each</text>

  <!-- Workers → transfer_exec arrow -->
  <line x1="595" y1="222" x2="595" y2="254" stroke="#34d399" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- ══ TRANSFER_EXEC ══ -->
  <rect x="390" y="258" width="410" height="44" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="595" y="276" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">transfer_exec(conn, mode, from, to, amt)</text>
  <text x="595" y="293" text-anchor="middle" fill="#64748b" font-size="10">dispatches to the Mode implementation</text>

  <!-- ══ LEGEND ══ -->
  <rect x="20" y="322" width="780" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="36" y="355" fill="#94a3b8" font-size="11">UNSAFE</text>
  <text x="36" y="371" fill="#475569" font-size="9">no control</text>
  <line x1="116" y1="330" x2="116" y2="374" stroke="#334155" stroke-width="1"/>
  <text x="128" y="355" fill="#94a3b8" font-size="11">APP_MUTEX</text>
  <text x="128" y="371" fill="#475569" font-size="9">pthread_mutex_t</text>
  <line x1="236" y1="330" x2="236" y2="374" stroke="#334155" stroke-width="1"/>
  <text x="248" y="355" fill="#94a3b8" font-size="11">APP_SEM</text>
  <text x="248" y="371" fill="#475569" font-size="9">sem_t</text>
  <line x1="336" y1="330" x2="336" y2="374" stroke="#334155" stroke-width="1"/>
  <text x="348" y="355" fill="#94a3b8" font-size="11">DB_FORUPDATE</text>
  <text x="348" y="371" fill="#475569" font-size="9">SELECT FOR UPDATE</text>
  <line x1="496" y1="330" x2="496" y2="374" stroke="#334155" stroke-width="1"/>
  <text x="508" y="355" fill="#94a3b8" font-size="11">DB_SERIALIZABLE</text>
  <text x="508" y="371" fill="#475569" font-size="9">SERIALIZABLE + retry</text>
  <line x1="668" y1="330" x2="668" y2="374" stroke="#334155" stroke-width="1"/>
  <text x="680" y="355" fill="#94a3b8" font-size="11">DB_ATOMIC</text>
  <text x="680" y="371" fill="#475569" font-size="9">atomic UPDATE</text>

</svg>
